<!DOCTYPE html>
<html lang="da">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skarp Hæk | Professionel Hækklipning</title>

<meta name="description" content="Professionel hækklipning med omhu. Vi klipper liguster, bøg, thuja og alle typer hække. Kontakt os for et uforpligtende tilbud.">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-BPTZ8YJV3P"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-BPTZ8YJV3P');

<style>

body{
    margin:0;
    background:#111;
    font-family:Arial,sans-serif;
}

.container{
    max-width:900px;
    margin:0 auto;
    padding:20px;
    text-align:center;
}

.poster{
    width:100%;
    height:auto;
    display:block;
    border-radius:10px;
    box-shadow:0 0 30px rgba(0,0,0,.4);
}

.contact-btn{
    margin-top:25px;
    padding:14px 28px;
    background:#7fbf1f;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

.contact-btn:hover{
    background:#6ca317;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    z-index:1000;
}

.modal-content{
    background:#fff;
    max-width:500px;
    margin:5vh auto;
    padding:30px;
    border-radius:10px;
}

.modal-content h2{
    margin-top:0;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

textarea{
    min-height:140px;
}

.send-btn{
    background:#7fbf1f;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:6px;
    cursor:pointer;
}

.send-btn:hover{
    background:#6ca317;
}

.close-btn{
    float:right;
    font-size:24px;
    cursor:pointer;
}

.footer{
    color:#ccc;
    margin-top:20px;
    line-height:1.8;
}

.footer a{
    color:#fff;
    text-decoration:none;
    font-weight:bold;
}

.footer a:hover{
    color:#7fbf1f;
}

</style>

</head>

<body>

<div class="container">

<img src="skarphaek01.png" alt="Skarp Hæk" class="poster">

<button class="contact-btn" onclick="openForm()">
Kontakt os
</button>

<div class="footer">

<a href="tel:+4522290099">
📞 222 900 99
</a>

<br>

<a href="mailto:kontakt@skarphaek.nu">
kontakt@skarphaek.nu
</a>

</div>

</div>

<div class="modal" id="contactModal">

<div class="modal-content">

<span class="close-btn" onclick="closeForm()">&times;</span>

<h2>Kontakt Skarp Hæk</h2>

<form action="https://formspree.io/f/xpqgwwdj" method="POST">

<input
type="hidden"
name="_next"
value="https://www.skarphaek.nu/tak.html">

<input
type="text"
name="Navn"
placeholder="Dit navn"
required>

<input
type="email"
name="Email"
placeholder="Din e-mail"
required>

<input
type="tel"
name="Telefon"
placeholder="Telefonnummer">

<textarea
name="Besked"
placeholder="Hvordan kan vi hjælpe?"
required></textarea>

<button
type="submit"
class="send-btn">
Send besked
</button>

</form>

</div>

</div>

<script>

function openForm(){
document.getElementById("contactModal").style.display="block";
}

function closeForm(){
document.getElementById("contactModal").style.display="none";
}

window.onclick=function(event){
const modal=document.getElementById("contactModal");
if(event.target===modal){
modal.style.display="none";
}
}

</script>

</body>
</html>
