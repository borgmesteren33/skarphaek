<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skarphæk</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background: #111;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .page {
      text-align: center;
      width: 100%;
    }

    .hero-image {
      max-width: 100%;
      max-height: 82vh;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    .contact {
      margin-top: 22px;
    }

    .contact a {
      color: white;
      text-decoration: none;
      font-size: 18px;
      background: rgba(255, 255, 255, 0.15);
      padding: 12px 20px;
      border-radius: 999px;
      display: inline-block;
    }

    .contact a:hover {
      background: rgba(255, 255, 255, 0.28);
    }
  </style>
</head>

<body>
  <main class="page">
    <img src="skarphaek01.png" alt="Skarphæk" class="hero-image" />

    <div class="contact">
      <a href="mailto:kontakt@skarphaek.nu">Kontakt</a>
    </div>
  </main>
</body>
</html>
